<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Goran Alajbeg – CV</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0a1628;
    --deep:       #0d2045;
    --ocean:      #0e3460;
    --mid:        #1a5276;
    --accent:     #1e88c7;
    --light-blue: #5dade2;
    --foam:       #a8d5f0;
    --pale:       #d6eaf8;
    --white:      #f4f9fd;
    --text:       #1a2a3a;
    --muted:      #4a7090;
    --rule:       rgba(30,136,199,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(14,52,96,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 90% 80%, rgba(26,82,118,0.6) 0%, transparent 70%),
      linear-gradient(165deg, #0a1628 0%, #0d2045 40%, #0e3460 70%, #0a1628 100%);
    z-index: -2;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        175deg,
        transparent,
        transparent 60px,
        rgba(30,136,199,0.04) 60px,
        rgba(30,136,199,0.04) 61px
      );
    z-index: -1;
    pointer-events: none;
  }

  /* ── LANGUAGE PICKER ── */
  .lang-bar {
    position: fixed;
    top: 14px;
    right: 20px;
    z-index: 200;
    display: flex;
    gap: 6px;
    background: rgba(10,22,40,0.75);
    border: 1px solid rgba(30,136,199,0.25);
    border-radius: 50px;
    padding: 5px 10px;
    backdrop-filter: blur(12px);
  }

  .lang-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.25rem;
    line-height: 1;
    padding: 3px 5px;
    border-radius: 6px;
    transition: background 0.2s, transform 0.15s;
    opacity: 0.55;
    filter: grayscale(0.4);
  }

  .lang-btn:hover {
    opacity: 0.85;
    transform: scale(1.15);
    background: rgba(30,136,199,0.12);
  }

  .lang-btn.active {
    opacity: 1;
    filter: none;
    background: rgba(30,136,199,0.2);
    transform: scale(1.1);
  }

  /* ── LAYOUT ── */
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
    opacity: 0;
    transform: translateY(-30px);
    animation: fadeDown 0.8s 0.1s ease forwards;
  }

  .name-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    font-weight: 400;
    font-style: italic;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .name-block .tagline {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--light-blue);
    margin-top: 6px;
  }

  .contact-block {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .contact-block a {
    color: var(--foam);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 300;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }

  .contact-block a:hover { color: var(--light-blue); }

  .contact-icon {
    display: inline-block;
    width: 16px;
    height: 16px;
    opacity: 0.6;
    flex-shrink: 0;
  }

  /* ── SECTIONS ── */
  section {
    margin-top: 36px;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--light-blue);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--rule), transparent);
  }

  /* ── EXPERIENCE ── */
  .entry {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 16px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(30,136,199,0.1);
    position: relative;
  }

  .entry:last-child { border-bottom: none; }

  .entry::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 24px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .entry:hover::before { opacity: 1; }

  .entry-company {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--white);
    grid-column: 1;
  }

  .entry-role {
    font-size: 0.82rem;
    color: var(--light-blue);
    font-weight: 500;
    margin-top: 2px;
    grid-column: 1;
  }

  .entry-date {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    white-space: nowrap;
    grid-row: 1 / 3;
    grid-column: 2;
    align-self: center;
    text-align: right;
    letter-spacing: 0.05em;
    /* prevent browser from linkifying date ranges */
    unicode-bidi: plaintext;
  }

  .entry-bullets {
    grid-column: 1 / -1;
    margin-top: 8px;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .entry-bullets li {
    font-size: 0.83rem;
    font-weight: 300;
    color: var(--pale);
    padding-left: 14px;
    position: relative;
    line-height: 1.55;
  }

  .entry-bullets li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.7rem;
    top: 1px;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }

  .skill-card {
    background: rgba(14,52,96,0.45);
    border: 1px solid rgba(30,136,199,0.18);
    border-radius: 10px;
    padding: 18px 20px;
    backdrop-filter: blur(8px);
    transition: transform 0.25s, border-color 0.25s, background 0.25s;
  }

  .skill-card:hover {
    transform: translateY(-3px);
    border-color: rgba(30,136,199,0.45);
    background: rgba(14,52,96,0.65);
  }

  .skill-card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--light-blue);
    margin-bottom: 10px;
  }

  .skill-card ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .skill-card li {
    font-size: 0.81rem;
    font-weight: 300;
    color: var(--pale);
    padding-left: 12px;
    position: relative;
    line-height: 1.5;
  }

  .skill-card li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 1rem;
    line-height: 1.2;
  }

  /* ── EDUCATION ── */
  .edu-entry {
    padding: 16px 0;
    border-bottom: 1px solid rgba(30,136,199,0.1);
  }

  .edu-entry:last-child { border-bottom: none; }

  .edu-institution {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--white);
  }

  .edu-degree {
    font-size: 0.82rem;
    color: var(--light-blue);
    margin-top: 3px;
  }

  .edu-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }

  .edu-date {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    white-space: nowrap;
    unicode-bidi: plaintext;
  }

  .edu-note {
    font-size: 0.81rem;
    color: var(--pale);
    font-weight: 300;
    margin-top: 6px;
    padding-left: 14px;
    position: relative;
  }

  .edu-note::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.7rem;
  }

  /* ── LANGUAGES & HOBBIES ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .info-card {
    background: rgba(14,52,96,0.35);
    border: 1px solid rgba(30,136,199,0.15);
    border-radius: 10px;
    padding: 18px 20px;
    backdrop-filter: blur(6px);
  }

  .info-card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--light-blue);
    margin-bottom: 10px;
  }

  .info-card ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .info-card li {
    font-size: 0.83rem;
    font-weight: 300;
    color: var(--pale);
    padding-left: 12px;
    position: relative;
    line-height: 1.5;
  }

  .info-card li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 1rem;
    line-height: 1.2;
  }

  /* ── DIVIDER ── */
  .nautical-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 0;
    opacity: 0.35;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--light-blue);
    user-select: none;
  }

  .nautical-divider::before,
  .nautical-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.4;
  }

  /* ── SCROLL PROGRESS ── */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(to right, var(--accent), var(--light-blue));
    width: 0%;
    z-index: 100;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px var(--accent);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .page { padding: 28px 16px 48px; }
    header { flex-direction: column; align-items: flex-start; }
    .contact-block { text-align: left; }
    .contact-block a { justify-content: flex-start; }
    .entry { grid-template-columns: 1fr; }
    .entry-date { grid-row: auto; grid-column: 1; text-align: left; margin-top: 2px; }
    .two-col { grid-template-columns: 1fr; }
    .skills-grid { grid-template-columns: 1fr; }
    .lang-bar { top: 10px; right: 10px; padding: 4px 8px; }
  }
</style>
</head>

// ── RENDER FUNCTIONS ──
function renderExperience(data) {
  return data.experience.map(e => `
    <div class="entry">
      <div class="entry-company">${e.company}</div>
      <div class="entry-date">${e.date}</div>
      <div class="entry-role">${e.role}</div>
      <ul class="entry-bullets">
        ${e.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
    </div>
  `).join('');
}

function renderEducation(data) {
  return data.education.map(e => `
    <div class="edu-entry">
      <div class="edu-meta">
        <div>
          <div class="edu-institution">${e.institution}</div>
          <div class="edu-degree">${e.degree}</div>
        </div>
        <div class="edu-date">${e.date}</div>
      </div>
      <div class="edu-note">${e.note}</div>
    </div>
  `).join('');
}

function renderSkills(data) {
  return data.skills.map(s => `
    <div class="skill-card">
      <div class="skill-card-title">${s.title}</div>
      <ul>
        ${s.items.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  `).join('');
}

function renderList(items) {
  return items.map(i => `<li>${i}</li>`).join('');
}

function applyLocale(lang) {
  const data = LOCALES[lang];
  if (!data) return;

  document.documentElement.lang = lang;
  document.getElementById('tagline').textContent = data.tagline;

  document.getElementById('sec-experience').textContent = data.sections.experience;
  document.getElementById('sec-education').textContent = data.sections.education;
  document.getElementById('sec-skills').textContent = data.sections.skills;
  document.getElementById('sec-langhob').textContent = data.sections.languages_hobbies;
  document.getElementById('sec-languages').textContent = data.sections.languages;
  document.getElementById('sec-hobbies').textContent = data.sections.hobbies;

  document.getElementById('experience-list').innerHTML = renderExperience(data);
  document.getElementById('education-list').innerHTML = renderEducation(data);
  document.getElementById('skills-grid').innerHTML = renderSkills(data);
  document.getElementById('languages-list').innerHTML = renderList(data.languages_list);
  document.getElementById('hobbies-list').innerHTML = renderList(data.hobbies_list);

  // Re-run entry stagger animations for newly rendered content
  document.querySelectorAll('section[data-animate]').forEach(sec => {
    const items = sec.querySelectorAll('.entry, .edu-entry, .skill-card, .info-card');
    items.forEach((item, i) => {
      item.style.opacity = '0';
      item.style.transform = 'translateY(16px)';
      item.style.transition = `opacity 0.4s ${i * 0.06}s ease, transform 0.4s ${i * 0.06}s ease`;
      requestAnimationFrame(() => setTimeout(() => {
        item.style.opacity = '1';
        item.style.transform = 'translateY(0)';
      }, 30));
    });
  });
}

// ── LANGUAGE SWITCHER ──
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyLocale(btn.dataset.lang);
    try { localStorage.setItem('cv-lang', btn.dataset.lang); } catch(e) {}
  });
});

// ── SCROLL PROGRESS ──
const bar = document.getElementById('progress-bar');
window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const total = document.body.scrollHeight - window.innerHeight;
  bar.style.width = (total > 0 ? (scrolled / total) * 100 : 100) + '%';
}, { passive: true });

// ── INTERSECTION OBSERVER FOR SECTIONS ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('section[data-animate]').forEach(el => observer.observe(el));

// ── INIT ──
(function init() {
  let lang = 'hr';
  try { lang = localStorage.getItem('cv-lang') || 'hr'; } catch(e) {}
  if (!LOCALES[lang]) lang = 'hr';
  const activeBtn = document.querySelector(`.lang-btn[data-lang="${lang}"]`);
  if (activeBtn) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    activeBtn.classList.add('active');
  }
  applyLocale(lang);
})();
</script>
